workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 60
    environment:
      xcode: latest
      node: 22
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.hilex.mobile
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build web assets
        script: npx vite build
      - name: Update Capacitor
        script: npx cap sync ios
      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files com.hilex.mobile \
            --type IOS_APP_STORE \
            --create \
            --strict-match-identifier
          keychain add-certificates
          xcode-project use-profiles
      - name: Build IPA
        script: |
          xcode-project build-ipa --workspace ios/App/App.xcworkspace --scheme App
    artifacts:
      - build/ios/ipa/*.ipa
