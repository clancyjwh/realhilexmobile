workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 60
    environment:
      xcode: latest
      node: 22
      groups:
        - ios
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.hilex.mobile
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build web assets
        script: npx vite build
      - name: Sync Capacitor
        script: npx cap sync ios
      - name: Remove OneSignal frameworks
        script: |
          find . -name "*OneSignal*" -delete 2>/dev/null || true
          find ~/Library/Developer/Xcode/DerivedData -name "*OneSignal*" -delete 2>/dev/null || true
          find ~/Library/Caches -name "*OneSignal*" -delete 2>/dev/null || true
      - name: Set up code signing
        script: |
          keychain initialize
          keychain add-certificates
          xcode-project use-profiles
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project ios/App/App.xcodeproj \
            --scheme App
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PUBLISHER_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
